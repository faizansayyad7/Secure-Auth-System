<!DOCTYPE html>
<html>
<head>
<title>Register</title>
<link rel="stylesheet"
href="{{url_for('static',filename='style.css')}}">
</head>

<body>

<div class="container">

<h1>📝 Register</h1>

<form method="POST">

<input type="text"
name="username"
placeholder="Username"
required>

<input type="password"
name="password"
placeholder="Password"
required>

<button>
Register
</button>

</form>

{% if qr %}

<div class="card">

<h3>Scan QR using Authenticator App</h3>

<img src="/{{qr}}" width="200">

</div>

{% endif %}

</div>

</body>
</html>
